  <style>
    /* Prevent FOUC */

    #app-loader {
      position: fixed; inset: 0;
      background: #060a0f;

      width: 64px; height: 64px;
      background: linear-gradient(135deg,#00d4ff,#0066cc);

      display: flex; align-items: center; justify-content: center;
      animation: loader-pulse 1.5s ease-in-out infinite;

      font-size: 32px; font-weight: 900; color: #fff;
    }
    .loader-name {
      font-family: 'Orbitron', serif;

      color: #00d4ff; letter-spacing: 4px;
    }
    .loader-sub {
      font-family: monospace;
      font-size: 10px; color: #4a7a9b; letter-spacing: 2px;
    }
    .loader-bar-wrap {
      width: 200px; height: 3px;
      background: #1a3352; border-radius: 2px; overflow: hidden;
    }
    .loader-bar {
      height: 100%; width: 0;
      background: linear-gradient(90deg, #00d4ff, #0066cc);
      border-radius: 2px;
      animation: loader-bar 1.2s ease forwards;
    }
    @keyframes loader-pulse {
      0%,100%{ box-shadow: 0 0 0 0 rgba(0,212,255,0.4); }
      50%{ box-shadow: 0 0 0 16px rgba(0,212,255,0); }
    }
    @keyframes loader-bar {
      from{ width:0 } to{ width:100% }
    }
  </style>

  <div class="loader-sub" style="margin-top:-10px">INITIALIZING SYSTEMS...</div>
</div>

<!-- ══════════════════════════════════════════════════════════════════════

  <!-- Rendered by app.js -->
</div>

<!-- ══════════════════════════════════════════════════════════════════════
     SCRIPTS — defer for performance
     ══════════════════════════════════════════════════════════════════════ -->
<script src="js/data.js" defer></script>
<script src="js/app.js" defer></script>

<!-- ══════════════════════════════════════════════════════════════════════
     BOOT SCRIPT — loader management & init
     ══════════════════════════════════════════════════════════════════════ -->
<script>
  /* Show body once fonts/styles are loaded */
  document.addEventListener('DOMContentLoaded', function() {
    document.body.classList.add('ready');

    /* Remove loader after app initialises */
    setTimeout(function() {
      var loader = document.getElementById('app-loader');
      if (loader) {
        loader.classList.add('fade-out');
        setTimeout(function() { loader.remove(); }, 500);
      }
    }, 1400);
  });

  /* Install prompt for PWA */
  var deferredPrompt;
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    deferredPrompt = e;
    /* Could show custom install button here */
  });

  window.addEventListener('appinstalled', function() {
    deferredPrompt = null;
    console.log('DDRiVE-M installed as PWA');
  });
</script>
